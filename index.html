<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINTER ANALYTICS - SECURE LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ice-bg-deep: #020617;
            --ice-blue-accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --loss-red: #ef4444;
            --profit-green: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--ice-bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- UPPER RIGHT PAYMENT LOGOS --- */
        .payment-bar {
            position: absolute;
            top: 30px;
            right: 50px;
            display: flex;
            gap: 25px;
            align-items: center;
            z-index: 100;
        }

        .payment-bar img {
            height: 22px;
            filter: brightness(0) invert(1);
            opacity: 0.4;
            transition: opacity 0.3s ease;
        }

        .payment-bar img:hover {
            opacity: 1;
        }

        /* --- TOP HALF: VIDEO BACKGROUND --- */
        .video-section {
            position: relative;
            height: 50vh;
            /* Exactly half the screen */
            width: 100%;
            overflow: hidden;
        }

        .video-section video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        .video-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 250px;
            background: linear-gradient(to bottom, rgba(2, 6, 23, 0) 0%, rgba(2, 6, 23, 1) 100%);
        }

        /* --- BOTTOM HALF: UI BACKGROUND --- */
        .login-section {
            height: 50vh;
            width: 100%;
            background-color: var(--ice-bg-deep);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- MASSIVE CENTERED LOGO --- */
        .logo-wrapper {
            position: absolute;
            top: 0;
            /* Anchors to the middle line between video and bottom half */
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 50;
            width: 100%;
        }

        .logo-wrapper h1 {
            margin: 0;
            font-size: clamp(3rem, 5vw, 5rem);
            /* Dynamically scales to be massive but safe on all laptops */
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
        }

        .logo-wrapper h1 span {
            color: var(--ice-blue-accent);
        }

        .logo-wrapper p {
            margin: 10px 0 0 0;
            color: var(--text-muted);
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        /* --- WIDE SPLIT GRID --- */
        .content-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            max-width: 1500px;
            /* Pushes boxes far to the edges */
            padding: 0 5%;
            /* Responsive edge padding */
            margin-top: 80px;
            /* Pushes grid down so it clears the massive logo */
            z-index: 10;
        }

        /* Shared Glass Box Styling */
        .glass-box {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 35px 40px;
            width: 380px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            box-sizing: border-box;
        }

        /* --- LEFT SIDE: LOGIN --- */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 15px;
            border-radius: 6px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: var(--ice-blue-accent);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .btn-login {
            width: 100%;
            background: var(--ice-blue-accent);
            color: #020617;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #f8fafc;
            transform: translateY(-2px);
        }

        .register-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .register-link span {
            color: var(--ice-blue-accent);
            font-weight: 600;
        }

        .register-link:hover span {
            color: #f8fafc;
            text-decoration: underline;
        }

        #error-msg {
            color: var(--loss-red);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 15px;
            display: none;
            font-weight: 600;
        }

        /* --- RIGHT SIDE: APP PROMO --- */
        .app-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .app-box h3 {
            margin: 0 0 10px 0;
            color: var(--text-main);
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .app-box p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0 0 25px 0;
            line-height: 1.5;
        }

        .qr-container {
            width: 160px;
            height: 160px;
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            transition: transform 0.3s;
        }

        .qr-container:hover {
            transform: scale(1.05);
        }

        .qr-container img {
            width: 100%;
            height: 100%;
        }

        .app-stores {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .app-stores img {
            height: 24px;
            filter: brightness(0) invert(1);
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="payment-bar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Visa_Inc._logo.svg/2560px-Visa_Inc._logo.svg.png"
            alt="Visa">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Mastercard-logo.svg/1280px-Mastercard-logo.svg.png"
            alt="Mastercard">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/PayPal.svg/2560px-PayPal.svg.png"
            alt="PayPal">
        <img src="https://cdn.prod.website-files.com/6271c4bfa6c2e361254394df/6274a12361b7e411b93198de_Paymongo_logo.svg"
            alt="PayMongo">
    </div>

    <div class="video-section">
        <video autoplay loop muted playsinline>
            <source src="assets/login_video.mp4" type="video/mp4">
        </video>
        <div class="video-gradient"></div>
    </div>

    <div class="login-section">

        <div class="logo-wrapper">
            <h1>WINTER <span>ANALYTICS</span></h1>
            <p>Advanced predictive modeling for the sharp bettor</p>
        </div>

        <div class="content-grid">

            <div class="glass-box">
                <form onsubmit="handleLogin(event)">
                    <div id="error-msg">Invalid credentials. Access denied.</div>

                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Enter username" required autocomplete="off">
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-login" id="login-btn">Authenticate</button>
                </form>

                <a href="https://ocr.brubai.net/" class="register-link">No account yet? <span>Register Here</span></a>
            </div>

            <div class="glass-box app-box">
                <h3>Take the Edge Anywhere</h3>
                <p>Scan to download the Winter Analytics native app for real-time alerts and live tracking.</p>

                <div class="qr-container">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://winteranalytics.com/download"
                        alt="Download QR">
                </div>

                <div class="app-stores">
                    <span>Available on</span>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Apple_logo_black.svg/512px-Apple_logo_black.svg.png"
                        alt="Apple">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Android_robot.svg/512px-Android_robot.svg.png"
                        alt="Android">
                </div>
            </div>

        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorBox = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            if (user === 'brub' && pass === 'brub1!') {
                errorBox.style.display = 'none';
                btn.style.background = 'var(--profit-green)';
                btn.style.color = '#fff';
                btn.innerText = 'Connecting to Terminal...';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            } else {
                errorBox.style.display = 'block';
                document.getElementById('password').value = '';
            }
        }
    </script>
</body>

</html>
